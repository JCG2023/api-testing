<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 250px; }
    button { padding: 10px 20px; }
    #result { margin-top: 20px; white-space: pre; }
  </style>
</head>
<body>

  <h2>Login API Test</h2>

  <label>Username:</label>
  <input id="username" type="text" placeholder="admin" />

  <label>Password:</label>
  <input id="password" type="password" placeholder="1234" />

  <button onclick="login()">Login</button>

  <div id="result"></div>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const response = await fetch(
        "https://myapi-testing.netlify.app/.netlify/functions/login",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        }
      );

      const data = await response.json();
      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
